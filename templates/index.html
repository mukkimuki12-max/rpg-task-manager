<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>計算機</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .calculator {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
            padding: 32px;
            width: 360px;
        }

        h1 {
            text-align: center;
            font-size: 1.4rem;
            color: #333;
            margin-bottom: 24px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 6px;
        }

        input[type="number"] {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="number"]:focus {
            border-color: #4a90e2;
        }

        .operator-group {
            margin-bottom: 20px;
        }

        .operator-group label {
            margin-bottom: 10px;
        }

        .operators {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .op-btn {
            padding: 12px;
            font-size: 1.3rem;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            background: #f8f9fa;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
        }

        .op-btn:hover {
            background: #e8f0fe;
            border-color: #4a90e2;
        }

        .op-btn.selected {
            background: #4a90e2;
            border-color: #4a90e2;
            color: #fff;
        }

        .calc-btn {
            width: 100%;
            padding: 14px;
            font-size: 1.1rem;
            background: #4a90e2;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 16px;
        }

        .calc-btn:hover {
            background: #357abd;
        }

        .result-box {
            background: #f8f9fa;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            padding: 16px;
            min-height: 56px;
            text-align: center;
        }

        .result-label {
            font-size: 0.8rem;
            color: #999;
            margin-bottom: 4px;
        }

        .result-value {
            font-size: 1.6rem;
            font-weight: bold;
            color: #333;
        }

        .result-value.error {
            color: #e53935;
            font-size: 1rem;
        }

        .expression {
            text-align: center;
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 8px;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>四則演算 計算機</h1>

        <div class="input-group">
            <label for="num1">数値 1</label>
            <input type="number" id="num1" placeholder="例: 10" step="any">
        </div>

        <div class="operator-group">
            <label>演算子</label>
            <div class="operators">
                <button class="op-btn selected" data-op="+">+</button>
                <button class="op-btn" data-op="-">−</button>
                <button class="op-btn" data-op="*">×</button>
                <button class="op-btn" data-op="/">÷</button>
            </div>
        </div>

        <div class="input-group">
            <label for="num2">数値 2</label>
            <input type="number" id="num2" placeholder="例: 5" step="any">
        </div>

        <button class="calc-btn" onclick="calculate()">計算する</button>

        <div class="expression" id="expression"></div>
        <div class="result-box">
            <div class="result-label">結果</div>
            <div class="result-value" id="result">—</div>
        </div>
    </div>

    <script>
        let selectedOp = "+";

        document.querySelectorAll(".op-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".op-btn").forEach(b => b.classList.remove("selected"));
                btn.classList.add("selected");
                selectedOp = btn.dataset.op;
            });
        });

        // Enterキーで計算
        document.addEventListener("keydown", e => {
            if (e.key === "Enter") calculate();
        });

        async function calculate() {
            const num1 = document.getElementById("num1").value;
            const num2 = document.getElementById("num2").value;
            const resultEl = document.getElementById("result");
            const exprEl = document.getElementById("expression");

            if (num1 === "" || num2 === "") {
                resultEl.textContent = "数値を入力してください";
                resultEl.className = "result-value error";
                exprEl.textContent = "";
                return;
            }

            const opSymbols = { "+": "+", "-": "−", "*": "×", "/": "÷" };

            const response = await fetch("/calculate", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ num1, num2, operator: selectedOp })
            });

            const data = await response.json();

            if (data.error) {
                resultEl.textContent = data.error;
                resultEl.className = "result-value error";
                exprEl.textContent = "";
            } else {
                exprEl.textContent = `${num1} ${opSymbols[selectedOp]} ${num2} =`;
                resultEl.textContent = data.result;
                resultEl.className = "result-value";
            }
        }
    </script>
</body>
</html>
